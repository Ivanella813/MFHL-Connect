name: Auto Update VPN Subscription

on:
  schedule:
    - cron: '27,57 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 25  # Убиваем зависший воркфлоу до следующего запуска

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'  # Фиксируем версию — '3.x' может сломаться при мажорном обновлении

      - name: Run Aggregator
        timeout-minutes: 22  # Оставляем 3 минуты на git push
        env:
          GITHUB_ACTIONS: "true"
          GLOBALPING_TOKEN: ${{ secrets.GLOBALPING_TOKEN }}
          IPINFO_TOKEN: ${{ secrets.IPINFO_TOKEN }}
        run: python main.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add subscription.txt subscription_base64.txt
          git diff --staged --quiet && echo "Изменений нет" && exit 0
          git commit -m "chore: auto-update subscription $(date -u +'%Y-%m-%d %H:%M') [skip ci]"
          git push
