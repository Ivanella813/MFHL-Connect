name: Auto Update VPN Subscription

on:
  schedule:
    # Запуск каждые 30 минут
    - cron: '27,57 * * * *'
  workflow_dispatch: # Позволяет запустить процесс вручную кнопкой

permissions:
  contents: write    # Важно: дает права на запись обновленных файлов в ваш репозиторий

jobs:
  update:
    runs-on: self-hosted 
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Aggregator (Once)
        shell: powershell # <--- ИЗМЕНЕНО: Используем нативный PowerShell вашей Windows
        run: |
          python -c "import main; main.run_aggregation()"

      - name: Commit and Push Changes
        shell: powershell # <--- ИЗМЕНЕНО: Команды Git адаптированы под PowerShell
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add subscription.txt subscription_base64.txt
          
          # Проверяем, изменились ли файлы подписки, чтобы избежать ошибки пустого коммита
          $status = git status --porcelain
          if ($status) {
              git commit -m "Auto-update subscription [skip ci]"
              git push
          } else {
              Write-Host "No changes to commit. Subscription is already up-to-date."
          }
