name: Auto Update VPN Subscription

on:
  schedule:
    # Запуск каждые 30 минут
    - cron: '27,57 * * * *'
  workflow_dispatch: # Позволяет запустить процесс вручную кнопкой

permissions:
  contents: write    # Права на запись в репозиторий

jobs:
  update:
    runs-on: ubuntu-latest   # ← GitHub-hosted раннер
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Run Aggregator (Once)
        run: |
          python -c "import main; main.run_aggregation()"

      - name: Commit and Push Changes
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add subscription.txt subscription_base64.txt
          # Если изменений нет – команда не упадёт благодаря || true
          git commit -m "Auto-update subscription [skip ci]" || true
          git push
