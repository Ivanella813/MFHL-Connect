name: Auto Update VPN Subscription

on:
  schedule:
    # Запуск каждые 30 минут
    - cron: '27,57 * * * *'
  workflow_dispatch: # Позволяет запустить процесс вручную кнопкой

permissions:
  contents: write    # Важно: дает права на запись обновленных файлов в ваш репозиторий

jobs:
  update:
    runs-on: self-hosted 
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Мы убрали шаг скачивания Python, так как он у вас уже есть!

      - name: Run Aggregator (Once)
        shell: bash 
        run: |
          # Запускаем скрипт через ваш установленный локальный Python
          python -c "import main; main.run_aggregation()"

      - name: Commit and Push Changes
        shell: bash 
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add subscription.txt subscription_base64.txt
          git commit -m "Auto-update subscription [skip ci]" || exit 0
          git push
